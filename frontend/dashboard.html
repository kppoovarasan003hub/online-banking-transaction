<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Zenith Bank</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <header>
            <div class="logo">ZENITH BANK</div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span id="userName" style="font-weight: 600;">Loading...</span>
                <button id="logoutBtn" style="background: none; border: 1px solid var(--border); color: white; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;">Logout</button>
            </div>
        </header>

        <section class="balance-card">
            <div class="balance-label">Total Balance</div>
            <div class="balance-amount" id="balanceDisplay">₹0.00</div>
        </section>

        <main class="actions-grid">
            <!-- Transfer Section -->
            <section class="action-card">
                <h3 style="margin-bottom: 1.5rem;">Transfer Money</h3>
                <form id="transferForm">
                    <div class="form-group">
                        <label>Receiver Email</label>
                        <input type="email" id="receiverEmail" placeholder="recipient@bank.com" required>
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="transferAmount" placeholder="0.00" step="0.01" required>
                    </div>
                    <button type="submit" class="btn">Send Money</button>
                </form>
            </section>

            <!-- History Section -->
            <section class="action-card">
                <h3 style="margin-bottom: 1.5rem;">Recent Transactions</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Recipient/Sender</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="transactionHistory">
                        <!-- Content injected by JS -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
